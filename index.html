<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #ffe5ec; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .envelope-container { cursor: pointer; animation: float 2s infinite ease-in-out; }
        .envelope { font-size: 100px; }
        .open-btn { margin-top: 15px; background: #ff4d6d; color: white; border: none; padding: 12px 25px; font-size: 1.1rem; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; width: 90%; display: none; }
        .media-box { width: 100%; margin-bottom: 15px; border-radius: 15px; overflow: hidden; }
        .media-box img { width: 100%; display: block; border-radius: 15px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="envelope-container" id="envelopeContainer" onclick="openEnvelope()">
        <div class="envelope">✉️💝</div>
        <!-- ဒီမှာ အင်္ဂလိပ်လို ပြင်ပေးထားပါတယ် -->
        <button class="open-btn">Open for Khaing Khaing Mon 💌</button>
    </div>

    <div class="card" id="birthdayCard">
        <h1>Happy Birthday! 🎂</h1>
        <h2>Khaing Khaing Mon ✨</h2>
        
        <div class="media-box"><img src="1772361125125.jpg" alt="Photo 1"></div>
        <div class="media-box"><img src="1772361098034.jpg" alt="Photo 2"></div>
        
        <p>Happy Birthday! Wishing you a day filled with love, laughter, and joy. Stay beautiful and happy always! 💖</p>
    </div>

    <video id="bgMusic" loop style="display:none;">
        <source src="video.mp4" type="video/mp4">
    </video>

    <script>
        function openEnvelope() {
            var music = document.getElementById('bgMusic');
            document.getElementById('envelopeContainer').style.display = 'none';
            document.getElementById('birthdayCard').style.display = 'block';
            music.play().catch(() => {
                alert("Please tap the screen to start the music!");
            });
        }
    </script>
</body>
</html>
