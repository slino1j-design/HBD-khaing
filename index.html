<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Khaing Khaing Mon!</title>
    <style>
        body { 
            text-align: center; 
            font-family: sans-serif; 
            background: #ffe5ec; 
            padding: 20px 15px; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            max-width: 360px; 
            margin: 0 auto; 
        }
        h1 { color: #ff4d6d; font-size: 1.8rem; margin-bottom: 5px; }
        h2 { color: #c9184a; margin-top: 0; }
        p { color: #4a4a4a; line-height: 1.6; font-size: 1.05rem; }
        
        .user-img {
            width: 100%;
            max-width: 280px;
            border-radius: 15px;
            margin: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .video-container {
            width: 100%;
            max-width: 280px;
            margin: 15px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Happy Birthday! 🎂</h1>
        <h2>Khaing Khaing Mon ✨</h2>
        
        <!-- မင်းပေးတဲ့ ပုံလေး -->
        <img class="user-img" src="https://i.imgur.com/XeBtY1L.jpg" alt="Khaing Khaing Mon">

        <p>မွေးနေ့မှစ၍ နောင်နှစ်ပေါင်းများစွာတိုင် စိတ်ချမ်းသာ၊ ကိုယ်ကျန်းမာနဲ့ လိုအင်ဆန္ဒတွေ ပြည့်ဝပါစေကြောင်း ဆုတောင်းပေးလိုက်ပါတယ်။ 💖</p>
        
        <!-- မင်းဆော့ထားတဲ့ ဗီဒီယိုလေး -->
        <div class="video-container">
            <video controls autoplay loop muted playsinline>
                <source src="https://i.imgur.com/XeBtY1L.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</body>
</html>
