<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <style>
        body { text-align: center; background: #ffe5ec; font-family: sans-serif; padding: 20px; }
        .card { display: none; background: white; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; }
        img, video, audio { width: 100%; border-radius: 15px; margin-bottom: 10px; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 50px; border: none; background: #ff4d6d; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="envelope">
        <div style="font-size: 100px;">✉️</div>
        <button onclick="start()">Open for Khaing Khaing Mon 💌</button>
    </div>

    <div id="card" class="card">
        <h1>Happy Birthday! 🎂</h1>
        
        <img src="1772361098034.jpg">
        <img src="1772361125125.jpg">
        
        <!-- ဗီဒီယိုဖိုင် -->
        <video id="myVideo" controls>
            <!-- ဒီနေရာမှာ ဗီဒီယိုဖိုင်နာမည် အစစ်ကို ထည့်ပါ -->
            <source src="မင်းရဲ့ဗီဒီယိုနာမည်.mp4" type="video/mp4">
        </video>

        <!-- သီချင်းသီးသန့် (MP3) -->
        <audio id="myAudio" controls>
            <source src="Hbd_-_zenith#fyp_#fypシ゚_#ti̇ktok_#myanmarsong_#music_.mp3" type="audio/mpeg">
        </audio>
        
        <p>မွေးနေ့မှစ၍ ပျော်ရွှင်ပါစေ။ 💖</p>
    </div>

    <script>
        function start() {
            document.getElementById('envelope').style.display = 'none';
            document.getElementById('card').style.display = 'block';
        }
    </script>
</body>
</html>
